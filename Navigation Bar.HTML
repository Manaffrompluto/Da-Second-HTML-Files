<!DOCTYPE html>
<html>
    <head>
        <title>Navigation Bar</title>
        <style>
            body {
                margin: 0;
                font-family: 'Courier New', Courier, monospace;
            }
            .topnav {
                overflow: hidden;
                background-color: #333;
                font-family: 'Courier New', Courier, monospace;
            }
            .topnav a {
                float: left;
                color: white;
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
                font-size: 17px;
                font-family: 'Courier New', Courier, monospace;
            }
            .topnav a:hover {
                background-color: #ddd;
                color: White;
                font-family: 'Courier New', Courier, monospace;
            }
            .topnav a.active {
                background-color: #ddd;
                color: white;
                font-family: 'Courier New', Courier, monospace;
            }
        </style>
    </head>
    <body>
        <div class="topnav">
            <a class="active" href="Home">Home Centre</a>
            <a href="#">About Centre</a>
            <a href="#">Gallery Centre</a>
            <a href="#">No Contact Center Totally</a>
        </div>
    </body>
</html>
